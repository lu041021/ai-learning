name: Security Audit
on:
  schedule:
    - cron: '37 9 * * 1'
  workflow_dispatch:
jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          workingDirectory: src-tauri
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
